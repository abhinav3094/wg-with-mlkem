version: "3.9"

services:
  peer_a:
    build: .
    container_name: peer_a
    hostname: peer_a
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - ./pq_handshake:/pq_handshake   # code only — no shared key volume
      - ./peer_a:/peer_config
    networks:
      lab_net:
        ipv4_address: 172.21.0.2

  peer_b:
    build: .
    container_name: peer_b
    hostname: peer_b
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - ./pq_handshake:/pq_handshake
      - ./peer_b:/peer_config
    networks:
      lab_net:
        ipv4_address: 172.21.0.3

networks:
  lab_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

# NO volumes: section — completely isolated containers
